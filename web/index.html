<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Modern campus life on tap. Connect with students, find resources, and stay in the loop.">

  <!-- Google Sign-In -->
  <meta name="google-signin-client_id" content="949237855418-xxxxxxxxxxxxxxxxxxxxxx.apps.googleusercontent.com">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="OG Vibes">
  <link rel="apple-touch-icon" href="assets/images/logo.jpeg">

  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="assets/images/logo.jpeg"/>

  <title>OG Vibes</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html,
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #0D47A1 0%, #448AFF 55%, #E3F2FD 100%);
      color: #ffffff;
      font-family: Poppins, sans-serif;
    }

    #flutter_loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }

    #flutter_loading h1 {
      margin: 0;
      font-size: 1.25rem;
      letter-spacing: 0.05em;
    }
  </style>

  <script>
    // Configure Firebase before the app loads
    window.flutterfire_web_sdk_version = "12.7.0";
  </script>
</head>
<body>
  <div id="flutter_loading">
    <div>
      <h1>OG Vibes is waking up...</h1>
    </div>
  </div>
  <!-- Passkeys Web SDK (required by passkeys_web plugin) -->
  <!-- If you prefer to vendor this file, download the bundle and serve it locally. -->
  <script src="https://github.com/corbado/flutter-passkeys/releases/download/2.4.0/bundle.js"></script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
